<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato - Portfólio Alisson Falcão</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <ul class="menu">
        <li><a href="index.html">Início</a></li>
        <li><a href="about.html">Sobre</a></li>
        <li><a href="projects.html">Projetos</a></li>
        <li><a href="contact.html" class="ativo">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contato">
      <h2>Entre em Contato</h2>
      <div class="info-contato">
        <p><strong>Telefone:</strong> <a href="tel:+556999999999">+55 (69) 99999-9999</a></p>
        <p><strong>Email:</strong> <a href="mailto:alisson@email.com">alisson@email.com</a></p>
        <p><strong>Localização:</strong> Ariquemes - Rondônia, Brasil</p>
      </div>

      <form class="form-contato">
        <input type="text" name="nome" placeholder="Seu nome" required>
        <input type="email" name="email" placeholder="Seu e-mail" required>
        <textarea name="mensagem" placeholder="Sua mensagem" rows="5" required></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <footer>
    <p>2026 Alisson - Todos os direitos reservados</p>
  </footer>

  <!-- JavaScript para validação e interatividade -->
  <script>
    // Validação simples do formulário
    document.querySelector(".form-contato").addEventListener("submit", function(e) {
      const nome = document.querySelector("input[name='nome']");
      const email = document.querySelector("input[name='email']");
      const mensagem = document.querySelector("textarea[name='mensagem']");

      if (!nome.value || !email.value || !mensagem.value) {
        alert("Por favor, preencha todos os campos!");
        e.preventDefault();
      } else if (!email.value.includes("@")) {
        alert("Por favor, insira um e-mail válido!");
        e.preventDefault();
      } else {
        alert("Mensagem enviada com sucesso!");
      }
    });

    // Rolagem suave ao clicar nos links do menu
    document.querySelectorAll('.menu a').forEach(link => {
      link.addEventListener('click', function(e) {
        if(this.hash !== "") {
          e.preventDefault();
          document.querySelector(this.hash).scrollIntoView({ behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
